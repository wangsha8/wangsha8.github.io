<!DOCTYPE html>
<html lang="en-us">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Menu System Mockup</title>
        <link rel="stylesheet" type="text/css" href="Content/bootstrap.min.css">
        <script src="Scripts/jquery-1.9.1.min.js"></script>
        <script src="Scripts/bootstrap.min.js" ></script>
        <script>
            $(function () {
                $('.list-group.checked-list-box .list-group-item').each(function () {

                    // Settings
                    var $widget = $(this),
                        $checkbox = $('<input type="checkbox" class="hidden" />'),
                        color = ($widget.data('color') ? $widget.data('color') : "primary"),
                        style = ($widget.data('style') == "button" ? "btn-" : "list-group-item-"),
                        settings = {
                            on: {
                                icon: 'glyphicon glyphicon-check'
                            },
                            off: {
                                icon: 'glyphicon glyphicon-unchecked'
                            }
                        };

                    $widget.css('cursor', 'pointer')
                    $widget.append($checkbox);

                    // Event Handlers
                    $widget.on('click', function () {
                        $checkbox.prop('checked', !$checkbox.is(':checked'));
                        $checkbox.triggerHandler('change');
                        updateDisplay();
                    });
                    $checkbox.on('change', function () {
                        updateDisplay();
                    });


                    // Actions
                    function updateDisplay() {
                        var isChecked = $checkbox.is(':checked');

                        // Set the button's state
                        $widget.data('state', (isChecked) ? "on" : "off");

                        // Set the button's icon
                        $widget.find('.state-icon')
                            .removeClass()
                            .addClass('state-icon ' + settings[$widget.data('state')].icon);

                        // Update the button's color
                        if (isChecked) {
                            $widget.addClass(style + color + ' active');
                        } else {
                            $widget.removeClass(style + color + ' active');
                        }
                    }

                    // Initialization
                    function init() {

                        if ($widget.data('checked') == true) {
                            $checkbox.prop('checked', !$checkbox.is(':checked'));
                        }

                        updateDisplay();

                        // Inject the icon if applicable
                        if ($widget.find('.state-icon').length == 0) {
                            $widget.prepend('<span class="state-icon ' + settings[$widget.data('state')].icon + '"></span>');
                        }
                    }
                    init();
                });

                $('#get-checked-data').on('click', function (event) {
                    event.preventDefault();
                    var checkedItems = {}, counter = 0;
                    $("#check-list-box li.active").each(function (idx, li) {
                        checkedItems[counter] = $(li).text();
                        counter++;
                    });
                    $('#display-json').html(JSON.stringify(checkedItems, null, '\t'));
                });
            });
        </script>
    </head>
    <body>
        <form action="confirm.html">
            <div class="panel-group row" id="accordion">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h4 class="panel-title">
                            <a data-toggle="collapse" data-parent="#accordion" href="#collapse1">&nbsp;Drink</a>
                        </h4>
                    </div>
                    <div id="collapse1" class="panel-collapse collapse">
                        <ul class="list-group checked-list-box">
                            <li class="list-group-item">Water</li>
                            <li class="list-group-item">Coke</li>
                            <li class="list-group-item">Sprite</li>
                        </ul>
                    </div>
                </div>

                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h4 class="panel-title">
                            <a data-toggle="collapse" data-parent="#accordion" href="#collapse2">&nbsp;Appetizer</a>
                        </h4>
                    </div>
                    <div id="collapse2" class="panel-collapse collapse">
                        <ul class="list-group checked-list-box">
                            <li class="list-group-item">
                                Pig Ear<br />
                                <img src="images/zhuerduo.jpg" style="width:200px" />
                            </li>
                            <li class="list-group-item">
                                Popcorn Chicken<br />
                                <img src="images/yansuji.jpg" style="width:200px" />
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h4 class="panel-title">
                            <a data-toggle="collapse" data-parent="#accordion" href="#collapse3">&nbsp;Hotpot</a>
                        </h4>
                    </div>
                    <div id="collapse3" class="panel-collapse collapse">
                        <ul class="list-group checked-list-box">
                            <li class="list-group-item">
                                Seafood Hotpot<br />
                                <img src="images/seafoodHotpot.jpg" style="width:200px" />
                            </li>
                            <li class="list-group-item">
                                Beef Hotpot<br />
                                <img src="images/beefHotpot.jpg" style="width:200px" />
                            </li>
                        </ul>
                    </div>
                </div>

            </div>
            <div class="row">
                <center><button class="btn btn-default">Submit</button></center>
            </div>
        </form>
        <style>
            html *
            {
               font-size: 1.25em !important;
               color: #000 !important;
               font-family: Arial !important;
            }
        </style>
    </body>
</html>
